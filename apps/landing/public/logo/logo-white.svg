<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <rect width="900" height="320" fill="#0D0A3C"/>

  <!-- ICON (scaled and positioned on the left) -->
  <g transform="translate(30, 15) scale(0.56)">
    <g fill="none" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left loop -->
      <path d="
        M 250 250
        L 160 400
        C 100 465, 40 420, 45 348
        C 50 288, 100 255, 160 268
        C 195 275, 225 260, 250 250
      "/>
      <!-- Right loop -->
      <path d="
        M 250 250
        L 340 400
        C 400 465, 460 420, 455 348
        C 450 288, 400 255, 340 268
        C 305 275, 275 260, 250 250
      "/>
      <!-- Checkmark arm -->
      <line x1="250" y1="250" x2="410" y2="62"/>
    </g>
  </g>

  <!-- WORDMARK (right side) -->
  <text x="340" y="145"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="800" font-size="90" fill="#FFFFFF" letter-spacing="-2">Insta</text>
  <text x="340" y="250"
        font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="400" font-size="90" fill="#FFFFFF" letter-spacing="-1">Checkout</text>
</svg>