<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" width="512" height="512">
  <defs>
    <!-- Clip to create weave: hide part of right loop where left arm crosses over it -->
    <clipPath id="weaveClipR-512">
      <rect x="0" y="0" width="500" height="520"/>
      <!-- Punch a hole where the left descending arm is -->
    </clipPath>
  </defs>

  <g fill="none" stroke="#8A2BE2" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">

    <!-- LEFT LOOP: center → down-left → curves left → curves back up → toward center -->
    <path d="
      M 250 250
      L 160 400
      C 100 465, 40 420, 45 348
      C 50 288, 100 255, 160 268
      C 195 275, 225 260, 250 250
    "/>

    <!-- RIGHT LOOP: center → down-right → curves right → curves back up → toward center -->
    <path d="
      M 250 250
      L 340 400
      C 400 465, 460 420, 455 348
      C 450 288, 400 255, 340 268
      C 305 275, 275 260, 250 250
    "/>

    <!-- CHECKMARK ARM: bold diagonal going up and to the right -->
    <line x1="250" y1="250" x2="410" y2="62"/>

  </g>
</svg>